<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>Graus Honoríficos - Priorado 146</title>
    <style>
        .card-honorifico {
            transition: transform 0.3s;
            cursor: pointer;
            border: 2px solid #ffc107 !important; 
            background-color: transparent; 
            color: #ffc107; 
        }
        .card-honorifico:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }
        .logo-honorifico {
            max-width: 80px; /* Tamanho da logo */
            margin-bottom: 15px; /* Espaço abaixo da logo */
        }
    </style>
</head>
<body class="bg-dark text-white" style="background-image: url(fundo146.png);">
   <div class="container mt-5">
    <h1 class="text-warning text-center mb-5">Títulos Honoríficos</h1>
    
    <div class="row row-cols-1 row-cols-md-2 g-4 justify-content-center" style="max-width: 800px; margin: 0 auto;">
        <div class="col" onclick="window.location.href='lista.html?tipo=comendador'">
            <div class="card h-100 card-honorifico d-flex flex-column align-items-center justify-content-center p-4">
                <img src="Comendador.png" alt="Logo Comendador" class="logo-honorifico" onerror="this.src='https://via.placeholder.com/100?text=Comendador'">
                <div class="card-body text-center">
                    <h3 class="card-title">Comendador da Cavalaria</h3>
                    <p class="card-text text-light">Ver membros agraciados</p>
                </div>
            </div>
        </div>
        <div class="col" onclick="window.location.href='lista.html?tipo=graocruz'">
            <div class="card h-100 card-honorifico flex flex-column align-items-center justify-content-center p-4">
                <img src="gra.png" alt="Logo Grão-Cruz" class="logo-honorifico" onerror="this.src='https://via.placeholder.com/100?text=Grão-Cruz'">
                <div class="card-body text-center">
                    <h3 class="card-title">Grã-Cruz da Cavalaria</h3>
                    <p class="card-text text-light">Ver membros agraciados</p>
                </div>
            </div>
        </div>
    </div>

    <div class="text-center mt-5">
        <a href="index.html" class="btn btn-outline-warning">Voltar ao Início</a>
    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="honorificos.js"></script>
</body>
</html>
